name: Publish Continuous Images
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch: # Optional: Allow manual triggering

jobs:
  build-and-push:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image_name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - image_name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Set outputs
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            raw_ref='${{ github.event.workflow_run.head_branch }}'
            sha_short="$(printf '%s' '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)"
          else
            raw_ref="${GITHUB_REF_NAME}"
            sha_short="$(git rev-parse --short HEAD)"
          fi
          sanitized_ref="$(printf '%s' "${raw_ref}" | tr '/:@ ' '-' | tr -cd '[:alnum:]._-' | sed 's/^-*//; s/-*$//')"
          echo "ref_name=${sanitized_ref}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${sha_short}" >> "$GITHUB_OUTPUT"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          # The Sentry args are only consumed by the frontend Dockerfile;
          # the backend image declares no matching ARG and ignores them.
          # Empty secrets pass through as empty strings, which makes
          # initSentry() a no-op rather than failing the build.
          build-args: |
            VERSION=sha-${{ steps.vars.outputs.sha_short }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_SENTRY_ENVIRONMENT=${{ vars.VITE_SENTRY_ENVIRONMENT || 'staging' }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_PROJECT=${{ vars.SENTRY_PROJECT }}
          tags: ghcr.io/${{ github.repository }}-${{ matrix.image_name }}:sha-${{ steps.vars.outputs.sha_short }},ghcr.io/${{ github.repository }}-${{ matrix.image_name }}:${{ steps.vars.outputs.ref_name }}
          file: ${{ matrix.dockerfile }}
