name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: make backend-install frontend-install

      - name: Run release validation
        run: make release-check

  publish-images:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image_name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - image_name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # The Sentry args are only consumed by the frontend Dockerfile;
          # the backend image declares no matching ARG and ignores them.
          # Empty secrets pass through as empty strings, which makes
          # initSentry() a no-op rather than failing the build.
          build-args: |
            VERSION=${{ github.ref_name }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_SENTRY_ENVIRONMENT=production
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_PROJECT=${{ vars.SENTRY_PROJECT }}
          tags: ghcr.io/${{ github.repository }}-${{ matrix.image_name }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

  github-release:
    needs: publish-images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            Release validation ran with `make release-check`.

            Container images published for this tag:
            - `ghcr.io/${{ github.repository }}-backend:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository }}-frontend:${{ github.ref_name }}`
