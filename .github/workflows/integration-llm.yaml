name: Integration (LLM)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC

jobs:
  llm-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        run: make backend-install

      - name: Run LLM integration tests
        env:
          INTEGRATION_LLM_MODEL: ${{ secrets.INTEGRATION_LLM_MODEL }}
          INTEGRATION_LLM_API_KEY: ${{ secrets.INTEGRATION_LLM_API_KEY }}
          INTEGRATION_LLM_ENDPOINT: ${{ secrets.INTEGRATION_LLM_ENDPOINT }}
          INTEGRATION_LLM_PROTOCOL: ${{ secrets.INTEGRATION_LLM_PROTOCOL }}
        run: make backend-test-integration-t3
