services:
  redis:
    image: redis/redis-stack:7.4.0-v3
    networks:
      - vandalizer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0.16
    networks:
      - vandalizer
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  chromadb:
    image: chromadb/chroma:0.6.3
    networks:
      - vandalizer
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # Baked into /app/VERSION so the app self-reports its build.
        # setup.sh exports VERSION (git describe); defaults to "dev" otherwise.
        VERSION: ${VERSION:-dev}
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      - REDIS_HOST=redis
      - MONGO_HOST=mongodb://mongo:27017/
      - CHROMADB_HOST=chromadb:8000
      - UPLOAD_DIR=/app/static/uploads
    networks:
      - vandalizer
    volumes:
      - uploads:/app/static/uploads
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # Baked into /app/VERSION so the app self-reports its build.
        # setup.sh exports VERSION (git describe); defaults to "dev" otherwise.
        VERSION: ${VERSION:-dev}
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      - REDIS_HOST=redis
      - MONGO_HOST=mongodb://mongo:27017/
      - CHROMADB_HOST=chromadb:8000
      - UPLOAD_DIR=/app/static/uploads
    networks:
      - vandalizer
    volumes:
      - uploads:/app/static/uploads
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    entrypoint: ["sh", "run_celery.sh", "start"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 12G
          cpus: "4.0"

  frontend:
    container_name: vandalizer-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-}
    depends_on:
      - api
    networks:
      - vandalizer
      - proxy-net
    restart: unless-stopped

networks:
  vandalizer:
    driver: bridge
  proxy-net:
    external: true

volumes:
  mongo-data:
    driver: local
  chroma-data:
    driver: local
  uploads:
    driver: local
